<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>영화관 명당</title>
<style>
  :root { color-scheme: light; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fff; color: #111;
         max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
  .head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
  h1 { font-size: 2.8rem; line-height: .92; font-weight: 800; letter-spacing: -.03em;
       text-transform: uppercase; margin: 0; }
  h1 .num { font-size: 1.4rem; font-weight: 500; vertical-align: top; margin-right: 4px; }
  .meta { text-align: right; font-weight: 700; font-size: 1.05rem; line-height: 1.2; }
  select { font: inherit; font-weight: 700; background: #fff; color: #111; border: 2px solid #111;
           border-radius: 10px 8px 9px 11px; padding: 7px 10px; margin: 0 6px 6px 0; cursor: pointer; }
  .screen { color: #999; text-align: center; font-weight: 700; letter-spacing: .4em; text-transform: uppercase;
            font-size: .8rem; padding-top: 10px; margin: 28px auto 24px; max-width: 70%;
            border-top: 5px solid #e8430a; border-radius: 50% 50% 0 0 / 22px 22px 0 0; }
  .hall { display: flex; flex-direction: column; gap: 5px; align-items: center; overflow-x: auto; }
  .row { display: flex; gap: 4px; align-items: center; }
  .rowlabel { width: 1.5em; text-align: center; font-size: .8rem; opacity: .55; font-weight: 700; }
  .seat { width: 27px; height: 25px; border: 1.5px solid #111; cursor: pointer; padding: 0;
          border-radius: 8px 7px 6px 9px / 7px 9px 8px 6px; font-size: .6rem; color: #111; }
  .seat.sel { outline: 3px solid #111; }
  .seat.ghost { visibility: hidden; }
  .aisle { width: 14px; }
  .S { background: #e8430a; color: #fff; } .A { background: #c8b832; }
  .B { background: #f2b3a7; } .C { background: #d9d4c2; }
  .legend { display: flex; gap: 14px; margin: 16px 0; font-size: .85rem; font-weight: 600; flex-wrap: wrap; }
  .legend span::before { content: ""; display: inline-block; width: 13px; height: 13px; border: 1.5px solid #111;
                         border-radius: 5px 4px 5px 4px; margin-right: 5px; vertical-align: -2px; }
  .legend .S::before { background: #e8430a; } .legend .A::before { background: #c8b832; }
  .legend .B::before { background: #f2b3a7; } .legend .C::before { background: #d9d4c2; }
  .legend span { background: none; color: #111; }
  #detail { margin-top: 14px; padding: 12px 16px; border: 2px solid #111; background: #faf6e8;
            border-radius: 16px 13px 15px 12px; min-height: 1.5em; font-size: .95rem; }
  #best { margin-top: 10px; font-size: .95rem; font-weight: 600; }
  .foot { text-align: center; font-weight: 800; font-size: 1.6rem; letter-spacing: -.02em;
          line-height: .95; text-transform: uppercase; margin-top: 40px; }
</style>
</head>
<body>
<div class="head">
  <h1><span class="num">(1)</span>Cinema<br>Spot</h1>
  <div class="meta">영화관 명당 찾기<br>예매 전 좌석 확인</div>
</div>
<div>
  <select id="chainSel"></select>
  <select id="branchSel"></select>
  <select id="screenSel"></select>
  <select id="genreSel"></select>
</div>
<div class="legend">
  <span class="S">S 명당</span><span class="A">A 좋음</span>
  <span class="B">B 무난</span><span class="C">C 비추</span>
</div>
<div class="screen">screen</div>
<div class="hall" id="hall"></div>
<p id="best"></p>
<div id="detail">좌석을 클릭하면 상세 정보가 표시됩니다.</div>
<div class="foot">Cinema<br>Spot</div>

<script src="data.js"></script>
<script>
const DEG = 180 / Math.PI;

// 장르별 목표 시야각: 자막은 약간 뒤(작은 각), 음악은 더 뒤, 3D/IMAX는 약간 앞(큰 각)
const GENRES = { "2D (기본)": 40, "자막 영화": 36, "음악·뮤지컬": 32, "3D·IMAX": 45 };

// 명당 점수: 수평 시야각(장르별 목표각)·중앙 이탈각 + 통로 옆/맨 뒷줄 감점
function scoreSeat(screen, rowIdx, offsetX, opts = {}) {
  const d = screen.firstRowDist + rowIdx * screen.rowSpacing;
  const hAngle = 2 * Math.atan(screen.screenWidth / 2 / d) * DEG; // 화면이 차지하는 수평 시야각
  const skew = Math.abs(Math.atan(offsetX / d)) * DEG;            // 중앙에서 벗어난 각도
  // ponytail: 단순 선형 페널티 휴리스틱 — 실측 후 계수(2.5, 2)만 조정하면 됨
  const angleScore = 100 - Math.min(100, Math.abs(hAngle - (opts.targetAngle ?? 40)) * 2.5);
  const aislePenalty = opts.byAisle ? 7 : 0;   // 관객 이동·비상등
  const backPenalty = opts.lastRow ? 10 : 0;   // 자막 가독성·몰입 저하
  const community = opts.communityBonus ?? 0;  // 실관람 후기 보너스
  return Math.min(100, Math.max(0, Math.round(angleScore - skew * 2 - aislePenalty - backPenalty + community)));
}
const grade = s => s >= 85 ? "S" : s >= 70 ? "A" : s >= 50 ? "B" : "C";

const $c = document.getElementById("chainSel");
const $b = document.getElementById("branchSel");
const $s = document.getElementById("screenSel");
const $g = document.getElementById("genreSel");
Object.keys(GENRES).forEach(g => $g.add(new Option(g, g)));
$g.onchange = () => render();
const $hall = document.getElementById("hall");
const $detail = document.getElementById("detail");
const $best = document.getElementById("best");

// 극장 이름 "체인 지점" 에서 체인/지점 파생 (예: "CGV 의정부")
const chainOf = t => t.name.split(" ")[0];
const branchOf = t => t.name.split(" ").slice(1).join(" ") || t.name;

[...new Set(THEATERS.map(chainOf))].forEach(c => $c.add(new Option(c, c)));
$c.onchange = () => {
  $b.innerHTML = "";
  THEATERS.forEach((t, i) => { if (chainOf(t) === $c.value) $b.add(new Option(branchOf(t), i)); });
  $b.onchange();
};
$b.onchange = () => {
  $s.innerHTML = "";
  THEATERS[$b.value].screens.forEach((sc, i) => $s.add(new Option(sc.name, i)));
  render();
};
$s.onchange = render;

function render() {
  const screen = THEATERS[$b.value].screens[$s.value];
  $hall.innerHTML = "";
  $detail.textContent = "좌석을 클릭하면 상세 정보가 표시됩니다.";
  let best = { score: -1 };

  screen.rows.forEach((row, ri) => {
    const $row = document.createElement("div");
    $row.className = "row";
    $row.insertAdjacentHTML("beforeend", `<span class="rowlabel">${row.label}</span>`);
    const center = screen.centerCol ?? (row.seats + 1) / 2;
    for (let n = 1; n <= row.seats; n++) {
      if (row.absent?.includes(n)) {
        $row.insertAdjacentHTML("beforeend", `<button class="seat ghost"></button>`);
        if (screen.aisles?.includes(n) && n < row.seats)
          $row.insertAdjacentHTML("beforeend", `<span class="aisle"></span>`);
        continue;
      }
      const offsetX = (n - center) * screen.seatWidth;
      const byAisle = n === 1 || n === row.seats ||
        screen.aisles?.some(a => n === a || n === a + 1);
      const opts = { targetAngle: GENRES[$g.value], byAisle,
                     lastRow: ri === screen.rows.length - 1,
                     communityBonus: screen.community?.[row.label] };
      const score = scoreSeat(screen, ri, offsetX, opts);
      const g = grade(score);
      const $seat = document.createElement("button");
      $seat.className = `seat ${g}`;
      $seat.textContent = n;
      $seat.onclick = () => {
        $hall.querySelector(".sel")?.classList.remove("sel");
        $seat.classList.add("sel");
        const d = screen.firstRowDist + ri * screen.rowSpacing;
        const hAngle = (2 * Math.atan(screen.screenWidth / 2 / d) * DEG).toFixed(1);
        const cm = screen.community?.[row.label]
          ? `<br>💬 실관람 후기 추천 열 (+${screen.community[row.label]}점) — ${screen.community.note}` : "";
        $detail.innerHTML = `<b>${row.label}${n}</b> — 등급 <b>${g}</b> (${score}점)<br>
          스크린까지 ${d.toFixed(1)}m · 수평 시야각 ${hAngle}° (권장 36~45°)${cm}`;
      };
      $row.appendChild($seat);
      if (screen.aisles?.includes(n) && n < row.seats)
        $row.insertAdjacentHTML("beforeend", `<span class="aisle"></span>`);
      if (score > best.score) best = { score, label: `${row.label}${n}` };
    }
    $row.insertAdjacentHTML("beforeend", `<span class="rowlabel">${row.label}</span>`);
    $hall.appendChild($row);
  });
  $best.innerHTML = `👑 이 관의 명당: ${best.label} (${best.score}점)` +
    (screen.note ? `<br>💬 ${screen.note}` : "");
}

$c.onchange();

// self-check: 중앙 중간열이 맨앞 구석보다 높아야 함
(() => {
  const sc = THEATERS[0].screens[0];
  const mid = scoreSeat(sc, Math.floor(sc.rows.length / 2), 0);
  const frontCorner = scoreSeat(sc, 0, 7 * sc.seatWidth);
  console.assert(mid > frontCorner, "scoring broken", { mid, frontCorner });
  console.assert(scoreSeat(sc, 5, 0, { byAisle: true }) < scoreSeat(sc, 5, 0), "aisle penalty broken");
})();
</script>
</body>
</html>
